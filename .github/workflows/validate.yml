name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync project environment
        run: uv sync --dev --locked

      - name: Validate skills
        run: |
          uv run python -m skills_ref.cli validate skills/wiki-ingest
          uv run python -m skills_ref.cli validate skills/query-writeback
          uv run python -m skills_ref.cli validate skills/wiki-lint

      - name: Run repository quality checks
        run: uv run python scripts/check_quality.py

      - name: Run runtime commands
        run: |
          uv run python scripts/wiki_lint.py examples/minimal-vault --fail-on p1
          uv run python scripts/wiki_search.py examples/minimal-vault "attention transformer" --limit 2
          uv run python scripts/wiki_obsidian_setup.py examples/minimal-vault --dry-run --skip-downloads
          uv run python scripts/wiki_claims.py --help
          uv run python scripts/wiki_concept_revision.py --help
          uv run python scripts/wiki_contradictions.py --help
          uv run python scripts/wiki_discover_sources.py --help
          uv run python scripts/wiki_grow.py --help
          uv run python scripts/wiki_ingest_corpus.py --help
          uv run python scripts/wiki_normalize_metrics.py --help
          uv run python scripts/wiki_queue.py --help
          uv run python scripts/wiki_science_review.py --help
          uv run python scripts/wiki_semantic_qa.py --help
          uv run python scripts/pdf_corpus_report.py --help
          uv run python scripts/pdf_corpus_to_markdown.py --help
          uv run python scripts/pdf_to_markdown.py --help
          uv run python scripts/wiki_writeback.py examples/minimal-vault \
            --target concepts/attention-mechanisms.md \
            --query "Why did attention become central?" \
            --body "Attention created direct token-to-token interaction paths. [[LLM-0001]]"
          uv run python scripts/wiki_eval.py

      - name: Check setup script syntax
        run: bash -n setup.sh
